schema_version = "1.0.0"

id = "paramsnap"
version = "0.0.6"
name = "ParamSnap"
tagline = "Save and recall Blender parameter snapshots"
maintainer = "LEDingQ"
type = "add-on"
tags = ["Animation", "Geometry Nodes", "Node", "User Interface"]
blender_version_min = "4.2.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

[permissions]
files = "Import and export ParamSnap JSON files"
clipboard = "Copy and paste ParamSnap snapshot data"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/*.zip",
]
